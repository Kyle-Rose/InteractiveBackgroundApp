<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Interactive Background App — by Kyle Rose</title>
</head>
<body>

    <main>
        <div id="about">
            <h1>Press Button To Change Background Color</h1>
                <p>Click the buttons below to change the background color of the page.</p>
                <p>Current Background Color: <span id="colorDisplay"></span></p>
        </div>
        <div id="buttonContainer">
            <button id="redButton">Red</button>
            <button id="greenButton">Green</button>
            <button id="blueButton">Blue</button>
            <button id="randomButton">Random Color</button>
            <input type="color" id="colorPicker">
            <button id="saveColorButton">Save Current Color</button>
        </div>

        <div id="savedColorsContainer">
            <ul id="savedColorsList">
            </ul>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
